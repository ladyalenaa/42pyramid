<script>

// === ТАБЛИЦА БУКВ (А=1..Я=33) ===
var LM={};
var alpha='АБВГДЕЁЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯ';
for(var i=0;i<alpha.length;i++){
  LM[alpha[i]]=i+1;
  LM[alpha[i].toLowerCase()]=i+1;
}

function sumDigits(n){var s=0;String(Math.abs(n)).split('').forEach(function(d){s+=+d;});return s;}

function sumStr(str){
  var s=0;
  for(var i=0;i<str.length;i++){var v=LM[str[i]]||0;s+=v;}
  while(s>42)s-=42;
  return Math.max(1,s);
}

function calcBase(dd,mm,yyyy,city,name){
  // 1. Сумма цифр даты
  var ds=String(dd)+String(mm)+String(yyyy);
  var sd=0;ds.split('').forEach(function(d){sd+=+d;});
  // 2. Число города
  var sc=sumStr(city.replace(/[^а-яёА-ЯЁ]/g,''));
  // 3. Число имени
  var sn=sumStr(name.replace(/[^а-яёА-ЯЁ]/g,''));
  // 4. Итог
  var base=sd+sc+sn;
  while(base>42)base-=42;
  if(base<1)base=1;
  return{base:base,sd:sd,sc:sc,sn:sn};
}

function cellVal(base,n){var v=(base*n)%42;return v===0?42:v;}

// === УРОВНИ ЭНЕРГИИ ===
var EN=[
  {r:[1,7],   la:'Сон',        co:'#c42020',de:'Блок, страх, низкая энергия'},
  {r:[8,14],  la:'Пробуждение',co:'#c05010',de:'Начало движения'},

];

function bandIdx(v){var i=0;while(i<BANDS.length&&v>BANDS[i])i++;return Math.min(i,5);}

  birth:   ['1-е воплощение','2-е воплощение','3-е воплощение','4-е воплощение','5-е воплощение','6-е воплощение'],
  chakra:  ['Чакра заблокирована','Чакра начинает просыпаться','Чакра в процессе трансформации','Чакра в хорошем состоянии','Чакра в гармонии','Чакра полностью открыта'],
  energy:  ['Очень низкий уровень','Низкий уровень','Средний уровень','Высокий уровень','Очень высокий уровень','Максимальный уровень']
};
function gl(v,t){return TBLS[t][bandIdx(v)];}

// === ПРОГНОЗЫ ===
var MO=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];

function calcAge(yyyy,mm,dd,yr,curMo){
  var age=yr-yyyy;
  if(curMo<mm||(curMo===mm&&new Date().getDate()<dd))age--;
  return Math.max(0,age);
}
function pY(base,yyyy,mm,dd,yr){
  var age=calcAge(yyyy,mm,dd,yr,new Date().getMonth()+1);
  var v=base+age;while(v>42)v-=42;return Math.max(1,v);
}
function pM(base,yyyy,mm,dd,yr,mo){
  var age=calcAge(yyyy,mm,dd,yr,mo);
  var v=base+age+mo;while(v>42)v-=42;return Math.max(1,v);
}

// === ТУЛТИП ===
function addTip(cell,n,v){
  cell.addEventListener('mouseenter',function(e){
    var t=document.getElementById('tp'),en=ge(v);
    t.style.display='block';
    t.innerHTML='<b style="color:#c4b8ff">'+n+'. '+NM[n]+'</b><br>Значение: <b style="color:#FFD700">'+v+'</b><br><span style="color:'+en.co+'">'+en.la+'</span><br><span style="color:#6a5e8a;font-size:11px">'+DESC[n]+'</span>';

  });
  cell.addEventListener('mousemove',function(e){var t=document.getElementById('tp');t.style.left=(e.clientX+16)+'px';t.style.top=(e.clientY-14)+'px';});

// === РАСЧЁТ И РЕНДЕР ===
function go(){
  
var day=document.getElementById('day').value;
var month=document.getElementById('month').value;
var year=document.getElementById('year').value;
var dob=year+'-'+String(month).padStart(2,'0')+'-'+String(day).padStart(2,'0');

  var name=document.getElementById('iname').value||'';

  if(!city.trim()){alert('Пожалуйста, укажите город рождения');return;}
  if(!name.trim()){alert('Пожалуйста, укажите имя');return;}
  var parts=dob.split('-').map(Number),yyyy=parts[0],mm=parts[1],dd=parts[2];
  var B=calcBase(dd,mm,yyyy,city,name),base=B.base;
  var vals={};for(var n=1;n<=42;n++)vals[n]=cellVal(base,n);

  document.getElementById('res').style.display='block';
  document.getElementById('br').innerHTML=
    'Базовое число: <strong>'+base+'</strong><br>'+
    '<span style="font-size:12px">дата ('+B.sd+') + город «'+city+'» ('+B.sc+') + имя «'+name+'» ('+B.sn+')</span>';

  document.getElementById('lg').innerHTML=LV.map(function(l){
    return '<div class="li"><div class="ld" style="background:'+l.co+'"></div><span>'+l.ch+'</span></div>';
  }).join('');

  // Пирамида
  var pyr=document.getElementById('pyr');pyr.innerHTML='';
  LV.slice().reverse().forEach(function(level){
    var row=document.createElement('div');row.className='pr';
    level.nums.forEach(function(n){
      var v=vals[n];
      var cell=document.createElement('div');
      cell.className='cl'+(n===base?' bh':'');
      cell.style.background=level.co;
      cell.innerHTML='<span class="cn">'+n+'</span><div class="dv"></div><span class="cv">'+v+'</span>';
      addTip(cell,n,v);
      row.appendChild(cell);
    });
    pyr.appendChild(row);
  });

  // === 21 ПОКАЗАТЕЛЬ ===

  // Вспомогательные
  function chakraNums(idx){return LV[idx].nums;}
  function chakraVals(idx){return LV[idx].nums.map(function(n){return vals[n];});}
  function chakraAvg(idx){var vs=chakraVals(idx);return Math.round(vs.reduce(function(a,b){return a+b;},0)/vs.length);}
  function chakraMax(idx){return Math.max.apply(null,chakraVals(idx));}
  function chakraMaxCell(idx){var mx=chakraMax(idx);return LV[idx].nums.find(function(n){return vals[n]===mx;});}

  // 1. Текущий сценарий
  var scenCell=base;var scenVal=vals[scenCell];var scenEn=ge(scenVal);

  // 2. Таланты — макс по каждой чакре
  var talents=LV.map(function(l,i){
    var mc=chakraMaxCell(i);
    return{cell:mc,val:vals[mc],chakra:l.ch};
  });

  // 3. Зона ограничений — 2 ячейки с наименьшими значениями
  var sorted=Object.entries(vals).sort(function(a,b){return a[1]-b[1]||a[0]-b[0];});
  var minV=sorted[0][1];
  var limitCells=sorted.filter(function(e){return e[1]<=minV+2;}).slice(0,2).map(function(e){return +e[0];});

  // 4. Прошлая жизнь — ячейка с наименьшим числом (мин индекс при равных)
  var pastCell=sorted[0];
  for(var i=1;i<sorted.length;i++){if(+sorted[i][1]<+pastCell[1]||(+sorted[i][1]===+pastCell[1]&&+sorted[i][0]<+pastCell[0]))pastCell=sorted[i];}
  var pastN=+pastCell[0];

  // 5. Финансы — среднее Манипуры (18-24)
  var finAvg=chakraAvg(2);

  // 6. Дети — среднее Свадхистханы (10-17)
  var kidsAvg=chakraAvg(1);

  // 7. Популярность — среднее Вишуддхи (31-35)
  var popAvg=chakraAvg(4);

  // 8. Воплощение — ячейка 42
  var birthVal=vals[42];

  // 9. Здоровье — ячейка 5
  var healthVal=vals[5];

  // 10. Карьера — ячейка 18
  var careerVal=vals[18];

  // 11. Отношения — ячейка 30
  var relVal=vals[30];

  // 12. Духовный рост — ячейка 42
  var spiritVal=vals[42];

  // 13. Цвет ауры — чакра с макс средним
  var avgs=LV.map(function(l,i){return chakraAvg(i);});
  var maxAvg=Math.max.apply(null,avgs);
  var auraIdx=avgs.indexOf(maxAvg);
  var auraChakra=LV[auraIdx];

  // 14. Уровень энергии — ячейка базового числа
  var energyVal=vals[base];

  // 15. Место в истории — ячейка с макс числом в доминирующей чакре
  var histCell=chakraMaxCell(auraIdx);

  // 16. Ключевые годы — 5 лет с макс числами из прогноза (следующие 20 лет)
  var now=new Date(),cy=now.getFullYear(),cm=now.getMonth()+1;
  var yearScores=[];
  for(var yr=cy;yr<=cy+30;yr++){
    var yv2=pY(base,yyyy,mm,dd,yr);
    yearScores.push({yr:yr,cell:yv2,val:vals[yv2]||yv2});
  }
  yearScores.sort(function(a,b){return b.val-a.val||a.yr-b.yr;});
  var keyYears=yearScores.slice(0,5).sort(function(a,b){return a.yr-b.yr;});

  // 17. Характер — 12 ключевых ячеек (по 2 из каждых 6 диапазонов ячеек)
  var charCells=[1,9,10,17,18,24,25,30,31,35,36,42];

  // 18. Идеальный партнёр
  var p1=base+21,p2=base-21;
  var pList=[];
  if(p1>=1&&p1<=42)pList.push(p1);
  if(p2>=1&&p2<=42)pList.push(p2);
  if(pList.length===0)pList=[1];
  var partnerCell=Math.min.apply(null,pList);

  // 19. Кармическая задача — ячейка с самым низким числом
  var karmaCell=+sorted[0][0];
  for(var ii=1;ii<sorted.length;ii++){if(+sorted[ii][1]<vals[karmaCell]||(+sorted[ii][1]===vals[karmaCell]&&+sorted[ii][0]<karmaCell))karmaCell=+sorted[ii][0];}

  // 20. Зона роста — ячейки со значениями 8-14
  var growthCells=Object.entries(vals).filter(function(e){return e[1]>=8&&e[1]<=14;}).map(function(e){return +e[0];});

  // 21. Энергодиагностика — среднее по каждой чакре
  var diagAvgs=LV.map(function(l,i){return{name:l.ch,co:l.co,avg:chakraAvg(i)};});

  // ==== РЕНДЕР ====
  var html='';

  // --- Блок 1: Текущий сценарий ---
  html+='<p class="sect">1. Текущий сценарий</p>';
  html+='<div class="cc" style="margin-bottom:10px">';
  html+='<div class="la">Ячейка №'+scenCell+'</div>';
  html+='<div class="va" style="color:'+scenEn.co+'">'+NM[scenCell]+'</div>';
  html+='<div class="da">Значение: <b>'+scenVal+'</b> · '+scenEn.la+' — '+scenEn.de+'</div>';
  html+='<div class="da" style="margin-top:4px;color:#7a7095">'+DESC[scenCell]+'</div>';
  html+='</div>';

  // --- Блок 2: Таланты ---
  html+='<p class="sect">2. Таланты (по одному из каждой чакры)</p>';
  html+='<div class="grid2" style="margin-bottom:10px">';
  talents.forEach(function(t){
    var en=ge(t.val);
    html+='<div class="cc"><div class="la">'+t.chakra+'</div><div class="va" style="color:'+en.co+'">'+t.val+'</div><div class="da">'+t.cell+'. '+NM[t.cell]+'</div></div>';
  });
  html+='</div>';

  // --- Блок 3: Зона ограничений ---
  html+='<p class="sect">3. Зона ограничений</p>';
  html+='<div class="grid2" style="margin-bottom:10px">';
  limitCells.forEach(function(n){
    var en=ge(vals[n]);
    html+='<div class="cc"><div class="la">Ячейка №'+n+'</div><div class="va" style="color:'+en.co+'">'+vals[n]+'</div><div class="da">'+NM[n]+'</div></div>';
  });
  html+='</div>';

  // --- Блок 4: Прошлая жизнь ---
  html+='<p class="sect">4. Прошлая жизнь</p>';
  html+='<div class="cc" style="margin-bottom:10px">';
  html+='<div class="la">Роль в прошлом воплощении (ячейка №'+pastN+')</div>';
  html+='<div class="va">'+NM[pastN]+'</div>';
  html+='<div class="da">Значение: '+vals[pastN]+' · Урок этой жизни: '+DESC[pastN]+'</div>';
  html+='</div>';

  // --- Блоки 5-12: Ключевые показатели ---
  html+='<p class="sect">Ключевые показатели (5–12)</p>';
  html+='<div class="grid2">';
  function card(title,val,label,sub){return '<div class="cc"><div class="la">'+title+'</div><div class="va">'+val+'</div><div class="da">'+label+(sub?'<br>'+sub:'')+'</div></div>';}
  html+=card('5. Финансы (среднее Манипуры 18–24)',finAvg,gl(finAvg,'finance'),'Уровень: '+ge(finAvg).la);
  html+=card('6. Дети (среднее Свадхистханы 10–17)',kidsAvg,gl(kidsAvg,'children'),'');
  html+=card('7. Популярность (среднее Вишуддхи 31–35)',popAvg,gl(popAvg,'popular'),'');
  html+=card('8. Воплощение (яч.42)',birthVal,gl(birthVal,'birth'),'');
  html+=card('9. Здоровье (яч.5)',healthVal,gl(healthVal,'health'),'');
  html+=card('10. Карьера (яч.18)',careerVal,gl(careerVal,'career'),'');
  html+=card('11. Отношения (яч.30)',relVal,gl(relVal,'rel'),'');
  html+=card('12. Духовный рост (яч.42)',spiritVal,gl(spiritVal,'spirit'),'');
  html+='</div>';

  // --- Блок 13: Цвет ауры ---
  html+='<p class="sect">13. Цвет ауры</p>';
  html+='<div class="cc" style="margin-bottom:10px;display:flex;align-items:center;gap:16px">';
  html+='<div class="aura-dot" style="background:'+auraChakra.co+'">'+maxAvg+'</div>';
  html+='<div><div style="font-size:18px;font-weight:700;color:'+auraChakra.co+'">'+auraChakra.aura.charAt(0).toUpperCase()+auraChakra.aura.slice(1)+'</div>';
  html+='<div style="font-size:13px;color:#8878aa;margin-top:3px">'+auraChakra.ch+' · среднее '+maxAvg+'</div></div></div>';

  // --- Блок 14: Уровень энергии ---
  html+='<p class="sect">14. Уровень энергии</p>';
  html+='<div class="cc" style="margin-bottom:10px">';
  var enE=ge(energyVal);
  html+='<div class="la">Ячейка базового числа №'+base+'</div>';
  html+='<div class="va" style="color:'+enE.co+'">'+energyVal+' — '+enE.la+'</div>';
  html+='<div class="da">'+gl(energyVal,'energy')+'</div>';
  html+='</div>';

  // --- Блок 15: Место в истории ---
  html+='<p class="sect">15. Место в истории</p>';
  html+='<div class="cc" style="margin-bottom:10px">';
  html+='<div class="la">'+auraChakra.ch+' · ячейка №'+histCell+'</div>';
  html+='<div class="va">'+NM[histCell]+'</div>';
  html+='<div class="da">Главный вклад: '+DESC[histCell]+'</div>';
  html+='</div>';

  // --- Блок 16: Ключевые годы ---
  html+='<p class="sect">16. Ключевые годы жизни</p>';
  html+='<div class="key-years">';
  keyYears.forEach(function(ky){
    var en=ge(ky.val);
    html+='<div class="ky"><div class="ky-yr" style="color:'+en.co+'">'+ky.yr+'</div><div class="ky-cell">яч.'+ky.cell+' · '+ky.val+' ('+en.la+')</div></div>';
  });
  html+='</div>';

  // --- Блок 17: Характер ---
  html+='<p class="sect">17. Характер</p>';
  html+='<div class="grid3" style="margin-bottom:10px">';
  charCells.forEach(function(n){
    var v=vals[n],en=ge(v);
    html+='<div class="cc"><div class="la">Яч.'+n+'</div><div style="font-size:13px;font-weight:600;color:'+en.co+'">'+NM[n]+'</div><div class="da">'+v+' · '+en.la+'</div></div>';
  });
  html+='</div>';

  // --- Блок 18: Идеальный партнёр ---
  html+='<p class="sect">18. Сценарий идеального партнёра</p>';
  html+='<div class="cc" style="margin-bottom:10px">';
  html+='<div class="la">Ячейка №'+partnerCell+' (base '+base+' ± 21)</div>';
  html+='<div class="va">'+NM[partnerCell]+'</div>';
  html+='<div class="da">Значение: '+vals[partnerCell]+' · '+DESC[partnerCell]+'</div>';
  html+='</div>';

  // --- Блок 19: Кармическая задача ---
  html+='<p class="sect">19. Кармическая задача</p>';
  html+='<div class="cc" style="margin-bottom:10px">';
  html+='<div class="la">Главный урок жизни (ячейка №'+karmaCell+')</div>';
  html+='<div class="va">'+NM[karmaCell]+'</div>';
  html+='<div class="da">'+DESC[karmaCell]+'</div>';
  html+='</div>';

  // --- Блок 20: Зона роста ---
  html+='<p class="sect">20. Зона роста (значения 8–14)</p>';
  if(growthCells.length){
    html+='<div class="tags">';
    growthCells.forEach(function(n){html+='<span class="tag" style="background:#1a2030;color:#88bbff">'+n+'. '+NM[n]+' ('+vals[n]+')</span>';});
    html+='</div>';
  }else{html+='<div style="font-size:13px;color:#6a5e8a;margin-bottom:8px">Нет ячеек в зоне пробуждения (все выше 14)</div>';}

  // --- Блок 21: Энергодиагностика ---
  html+='<p class="sect">21. Энергодиагностика чакр</p>';
  html+='<div class="diag-row">';
  diagAvgs.forEach(function(d){
    var pct=Math.round((d.avg/42)*100);
    var status=gl(d.avg,'chakra');
    html+='<div class="diag-bar">';
    html+='<div class="db-name">'+d.name+'</div>';
    html+='<div class="db-track"><div class="db-fill" style="width:'+pct+'%;background:'+d.co+'"></div></div>';
    html+='<div class="db-val">'+d.avg+'</div>';
    html+='</div>';
    html+='<div style="font-size:11px;color:#6a5e8a;padding-left:120px;margin-top:-4px;margin-bottom:4px">'+status+'</div>';
  });
  html+='</div>';

  // --- ГОДОВОЙ ПРОГНОЗ ---
  html+='<p class="sect">Годовой прогноз</p>';
  var ageNow=calcAge(yyyy,mm,dd,cy,cm);
  html+='<div style="font-size:12px;color:#6a5e8a;margin-bottom:10px">Возраст: <b style="color:#c4b8ff">'+ageNow+' лет</b> · Формула: base('+base+') + возраст</div>';
  html+='<div class="pg">';
  [cy,cy+1,cy+2,cy+3].forEach(function(yr){
    var yv=pY(base,yyyy,mm,dd,yr),yEn=ge(yv);
    var age=calcAge(yyyy,mm,dd,yr,6);
    html+='<div class="pb"><div class="pt">'+yr+' год ('+age+' лет)</div>';
    html+='<div class="pv" style="color:'+yEn.co+'">яч.'+yv+' — '+yEn.la+'</div>';
    html+='<div class="pd">'+NM[yv]+'<br>'+yEn.de+'</div></div>';
  });
  html+='</div>';

  // --- МЕСЯЧНЫЙ ПРОГНОЗ ---
  html+='<p class="sect">Месячный прогноз — '+cy+'</p>';
  html+='<div style="font-size:12px;color:#6a5e8a;margin-bottom:10px">Формула: base('+base+') + возраст + номер месяца</div>';
  html+='<div class="mg">';
  for(var mo=1;mo<=12;mo++){
    var mv=pM(base,yyyy,mm,dd,cy,mo),mEn=ge(mv),isCur=(mo===cm);
    html+='<div class="mb'+(isCur?' cur':'')+'" style="background:'+mEn.co+'22;border-color:'+mEn.co+(isCur?';border-width:2px':'')+'">';
    html+='<div class="mn" style="color:'+mEn.co+'">'+MO[mo-1]+'</div>';
    html+='<div class="mv">'+mv+'</div>';
    html+='<div class="ml" style="color:'+mEn.co+'">'+mEn.la+'</div>';
    html+='</div>';
  }
  html+='</div>';

  document.getElementById('out').innerHTML=html;
}

// Ждём действия пользователя

window.addEventListener('load',function(){
const d=document.getElementById('day');
const m=document.getElementById('month');
const y=document.getElementById('year');

for(let i=1;i<=31;i++){
 let o=document.createElement('option');
 o.value=i;o.textContent=i;
 d.appendChild(o);
}

const months=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
months.forEach((name,index)=>{
 let o=document.createElement('option');
 o.value=index+1;
 o.textContent=name;
 m.appendChild(o);
});

const currentYear=new Date().getFullYear();
for(let yr=currentYear;yr>=1900;yr--){
 let o=document.createElement('option');
 o.value=yr;
 o.textContent=yr;
 y.appendChild(o);
}
});


</script>

<script>
function initUnifiedWheel(){
 const months=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
 const d=document.getElementById('w-dd');
 if(!d) return;
 let dh='',mh='',yh='';
 for(let i=1;i<=31;i++) dh+=`<div class="wheel-item" data-v="${i}">${i}</div>`;
 for(let i=1;i<=12;i++) mh+=`<div class="wheel-item" data-v="${i}">${months[i-1]}</div>`;
 let cy=new Date().getFullYear();
 for(let i=cy;i>=1920;i--) yh+=`<div class="wheel-item" data-v="${i}">${i}</div>`;
 document.getElementById('w-dd').innerHTML=dh;
 document.getElementById('w-mm').innerHTML=mh;
 document.getElementById('w-yyyy').innerHTML=yh;

 ['w-dd','w-mm','w-yyyy'].forEach(id=>{
   const col=document.getElementById(id);
   col.addEventListener('scroll',()=>{
      const items=col.querySelectorAll('.wheel-item');
      const idx=Math.round(col.scrollTop/40);
      items.forEach((el,i)=>el.classList.toggle('active',i===idx));
   });
   setTimeout(()=>col.dispatchEvent(new Event('scroll')),50);
 });
}
document.addEventListener('DOMContentLoaded',initUnifiedWheel);
</script>
