<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Пирамида 42 — Леди Алёна</title>
<style>
/*
  ПАЛИТРА (с фото):
  --bg:       #f7f3f8  — светло-сиреневый фон (почти белый с сиренью)
  --surface:  #ede6f2  — карточки, формы
  --surface2: #e4daf0  — чуть темнее, hover
  --border:   #d5c8e4  — бордюры
  --accent:   #9b7ebd   — лавандово-фиолетовый (главный акцент) #F172A1
  --accent2:  #7d5fa0  — тёмно-фиолетовый (заголовки)
  --accent3:  #b89cc8  — мягкая лаванда
  --rose:     #c4899a  — пыльная роза (акцент 2)
  --plum:     #a0607a  — слива (тёмный акцент)
  --text:     #3d2b55  — основной текст
  --text2:    #7a6490  — вторичный текст
  --text3:    #a896bc  — третичный текст
*/
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f7f3f8;color:#3d2b55;min-height:100vh;padding:20px 16px 50px}
.app{max-width:740px;margin:0 auto}
.brand{text-align:center;margin-bottom:6px;font-size:11px;color:#a896bc;letter-spacing:2px;text-transform:uppercase}
h1{text-align:center;font-size:clamp(22px,5vw,30px);font-weight:700;color:#7d5fa0;margin-bottom:6px;letter-spacing:1px}
.sub{text-align:center;font-size:24px;font-weight:800;color:#5c3d7a;margin-bottom:24px;text-shadow:0 1px 0 rgba(255,255,255,.8)}

/* ФОРМА */
.form-wrap{background:#ede6f2;border-radius:14px;padding:20px;margin-bottom:20px;border:1px solid #d5c8e4;box-shadow:0 2px 12px rgba(125,95,160,.08)}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ff{grid-column:1/-1}
.fg label,.compat-person label{font-size:12px;color:#7a6490;display:block;margin-bottom:5px}
input[type=text],select{width:100%;padding:10px 12px;background:#f7f3f8;border:1px solid #c8b8dc;border-radius:8px;color:#3d2b55;font-size:14px;transition:border-color .2s}
input[type=text]:focus,select:focus{outline:none;border-color:#F172A1;box-shadow:0 0 0 3px rgba(155,126,189,.15)}
select option{background:#ede6f2;color:#3d2b55}
.btn{width:100%;padding:12px;background:linear-gradient(135deg,#F172A1,#7d5fa0);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:4px;letter-spacing:.5px;transition:all .2s;box-shadow:0 3px 12px rgba(125,95,160,.3)}
.btn:hover{background:linear-gradient(135deg,#b99fd4,#F172A1);box-shadow:0 4px 16px rgba(125,95,160,.4)}
.btn:active{transform:scale(.98)}

/* РЕЗУЛЬТАТ */
.res{display:none}
.base-row{text-align:center;font-size:13px;color:#7a6490;margin-bottom:14px;line-height:1.7}
.base-row strong{color:#a0607a;font-size:18px;font-weight:700}

/* ПИРАМИДА */
.pw{display:flex;justify-content:center;margin-bottom:20px;overflow-x:auto;padding:8px;background:#ede6f2;border-radius:14px;border:1px solid #d5c8e4}
.pyr{display:flex;flex-direction:column;align-items:center;gap:3px}
.pr{display:flex;gap:3px}
.cl{width:clamp(38px,10vw,54px);height:clamp(36px,9vw,50px);border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:transform .15s,box-shadow .15s;position:relative}
.cl:hover{transform:scale(1.12);z-index:10}
.cl.bh{box-shadow:0 0 0 3px #a0607a,0 0 16px rgba(160,96,122,.5);z-index:3;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 3px #a0607a,0 0 16px rgba(160,96,122,.5)}50%{box-shadow:0 0 0 3px #a0607a,0 0 26px rgba(160,96,122,.7)}}
.cl .cn{font-size:clamp(8px,2vw,10px);font-weight:600;opacity:.8;line-height:1;color:#fff}
.cl .dv{width:22px;height:1px;margin:2px 0;background:rgba(255,255,255,.4)}
.cl .cv{font-size:clamp(12px,3vw,16px);font-weight:800;color:#fff;line-height:1}

/* СЕКЦИИ */
.sect{font-size:15px;font-weight:600;color:#7d5fa0;margin:20px 0 10px;border-left:3px solid #F172A1;padding-left:10px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px}

/* КАРТОЧКИ */
.cc{background:#ede6f2;border-radius:10px;padding:12px 14px;border:1px solid #d5c8e4;transition:box-shadow .2s}
.cc:hover{box-shadow:0 2px 12px rgba(125,95,160,.12)}
.cc .la{font-size:11px;color:#a896bc;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.cc .va{font-size:22px;font-weight:700;color:#7d5fa0}
.cc .da{font-size:12px;color:#7a6490;margin-top:3px;line-height:1.4}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.tag{background:#e4daf0;color:#7d5fa0;border-radius:6px;padding:4px 10px;font-size:12px;line-height:1.4;border:1px solid #cebfe0}

/* ПРОГНОЗЫ */
.pg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.pb{background:#ede6f2;border-radius:10px;padding:14px;border:1px solid #d5c8e4}
.pb .pt{font-size:12px;color:#a896bc;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.pb .pv{font-size:17px;font-weight:700;line-height:1.3}
.pb .pd{font-size:12px;color:#7a6490;margin-top:3px;line-height:1.4}
.mg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px}
.mb{border-radius:10px;padding:10px 8px;text-align:center;border:1px solid transparent;background:#ede6f2}
.mb .mn{font-size:11px;font-weight:600;margin-bottom:3px}
.mb .mv{font-size:14px;font-weight:800;color:#3d2b55;line-height:1.3}
.mb .ml{font-size:10px;opacity:.8;margin-top:2px}
.mb.cur{border-width:2px;background:#e4daf0}

/* ЛЕГЕНДА */
.lg{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:14px}
.li{display:flex;align-items:center;gap:5px;font-size:12px;color:#7a6490}
.ld{width:12px;height:12px;border-radius:3px}

/* ТУЛТИП */
.tp{position:fixed;background:#fff;color:#3d2b55;border-radius:10px;padding:10px 14px;font-size:12px;pointer-events:none;z-index:9999;max-width:220px;display:none;line-height:1.6;border:1px solid #d5c8e4;box-shadow:0 4px 20px rgba(125,95,160,.2)}

/* АУРА */
.aura-dot{width:60px;height:60px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;margin:6px 0;box-shadow:0 2px 12px rgba(0,0,0,.15)}

/* ДИАГНОСТИКА */
.diag-row{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.diag-bar{display:flex;align-items:center;gap:10px;font-size:12px}
.diag-bar .db-name{width:110px;color:#7a6490;flex-shrink:0}
.diag-bar .db-track{flex:1;height:10px;background:#e4daf0;border-radius:5px;overflow:hidden}
.diag-bar .db-fill{height:100%;border-radius:5px}
.diag-bar .db-val{width:30px;text-align:right;font-weight:600;color:#7d5fa0}

/* ТАБЛИЦА ГОДОВ */
.key-years{margin-bottom:12px}
.ky-table{width:100%;border-collapse:collapse;font-size:13px}
.ky-table th{padding:7px 10px;color:#a896bc;font-weight:500;text-align:left;border-bottom:1px solid #d5c8e4;font-size:12px;background:#e4daf0;text-transform:uppercase;letter-spacing:.4px}
.ky-table td{padding:7px 10px;border-bottom:1px solid #e4daf0;color:#3d2b55}
.ky-table tr:last-child td{border-bottom:none}
.ky-table tr:hover td{background:#f0eaf6}
.ky-table .star{color:#a0607a;font-size:14px}

/* СОВМЕСТИМОСТЬ */
.compat-pair{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.compat-person{background:#f7f3f8;border-radius:10px;padding:14px;border:1px solid #d5c8e4}
.compat-person h4{font-size:13px;color:#7d5fa0;font-weight:600;margin-bottom:8px}
.compat-person select,.compat-person input{font-size:13px;padding:8px 10px}
.compat-section{background:#ede6f2;border-radius:10px;padding:14px;border:1px solid #d5c8e4;margin-bottom:10px}
.compat-section h4{font-size:13px;color:#7d5fa0;font-weight:600;margin-bottom:8px}

/* ТАБЫ */
.tab-wrap{margin-bottom:20px}
.tab-track{position:relative;display:flex;background:#ede6f2;border-radius:12px;padding:4px;border:1px solid #d5c8e4;box-shadow:inset 0 1px 3px rgba(125,95,160,.1)}
.tab-slider{position:absolute;top:4px;left:4px;height:calc(100% - 8px);border-radius:9px;background:linear-gradient(135deg,#F172A1,#7d5fa0);transition:transform .3s cubic-bezier(.4,0,.2,1),width .3s cubic-bezier(.4,0,.2,1);box-shadow:0 2px 10px rgba(125,95,160,.35);z-index:0}
.tab-btn{flex:1;position:relative;z-index:1;padding:11px 8px;border:none;background:transparent;color:#7a6490;font-size:14px;font-weight:500;cursor:pointer;border-radius:9px;transition:color .25s;white-space:nowrap}
.tab-btn.active{color:#fff;font-weight:600}
.panel{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* АДАПТИВ */
@media(max-width:600px){
  .fg,.grid2,.grid3,.pg,.compat-pair{grid-template-columns:1fr}
  .ff{grid-column:1}
  .mg{grid-template-columns:repeat(3,1fr)}
  .diag-bar .db-name{width:80px;font-size:11px}
  body{padding:12px 10px 50px}
  .pyr{min-width:360px}
}
@media(max-width:400px){
  .mg{grid-template-columns:repeat(2,1fr)}
  .grid3{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div class="app">
  <div class="brand">Авторская система самопознания</div>
  <h1> Пирамида 42</h1>
  <p class="sub">✨ Персональная карта Леди Алёны ✨</p>

  <!-- TAB SWITCHER -->
  <div class="tab-wrap">
    <div class="tab-track">
      <div class="tab-slider" id="tabSlider"></div>
      <button class="tab-btn active" id="tab1" onclick="switchTab(0)">Персональная пирамида</button>
      <button class="tab-btn" id="tab2" onclick="switchTab(1)">Пирамида совместимости</button>
      <button class="tab-btn" id="tab3" onclick="switchTab(2)">🔥 Зумерская пирамида</button>
      <button class="tab-btn" id="tab4" onclick="switchTab(3)">🔥 Зумерская совместимость</button>
    </div>
  </div>

  <!-- ПАНЕЛЬ 1: ПЕРСОНАЛЬНАЯ -->
  <div class="panel" id="panel1">
    <div class="form-wrap">
      <div class="fg">
        <div class="ff">
          <label>Дата рождения</label>
          <div style="display:grid;grid-template-columns:1fr 2fr 1.3fr;gap:8px">
            <select id="day"><option value="">День</option></select>
            <select id="month"><option value="">Месяц</option></select>
            <select id="year"><option value="">Год</option></select>
          </div>
        </div>
        <div><label>Город рождения</label><input type="text" id="city" placeholder=" "></div>
        <div><label>Имя</label><input type="text" id="iname" placeholder=" "></div>
        <div class="ff"><button class="btn" onclick="go()">✨ Рассчитать пирамиду</button></div>
      </div>
    </div>
    <div class="res" id="res">
      <div class="base-row" id="br"></div>
      <div class="lg" id="lg"></div>
      <div class="pw"><div class="pyr" id="pyr"></div></div>
      <div id="out"></div>
    </div>
  </div>

  <!-- ПАНЕЛЬ 2: СОВМЕСТИМОСТЬ -->
  <div class="panel" id="panel2" style="display:none">
    <div class="form-wrap">
      <div class="compat-pair">
        <div class="compat-person">
          <h4>Партрнёр 1</h4>
          <label>День / Месяц / Год</label>
          <div style="display:grid;grid-template-columns:1fr 2fr 1.3fr;gap:6px;margin-bottom:8px">
            <select id="a_day"><option value="">День</option></select>
            <select id="a_month"><option value="">Месяц</option></select>
            <select id="a_year"><option value="">Год</option></select>
          </div>
          <label>Город рождения</label>
          <input type="text" id="a_city" placeholder=" " style="margin-bottom:8px">
          <label>Имя</label>
          <input type="text" id="a_name" placeholder=" ">
        </div>
        <div class="compat-person">
          <h4>Партрнёр 2</h4>
          <label>День / Месяц / Год</label>
          <div style="display:grid;grid-template-columns:1fr 2fr 1.3fr;gap:6px;margin-bottom:8px">
            <select id="b_day"><option value="">День</option></select>
            <select id="b_month"><option value="">Месяц</option></select>
            <select id="b_year"><option value="">Год</option></select>
          </div>
          <label>Город рождения</label>
          <input type="text" id="b_city" placeholder=" " style="margin-bottom:8px">
          <label>Имя</label>
          <input type="text" id="b_name" placeholder=" ">
        </div>
      </div>
      <button class="btn" style="margin-top:12px" onclick="calcCompat()">💫 Рассчитать совместимость</button>
    </div>
    <div id="compat-out"></div>
  </div>

  <!-- ПАНЕЛЬ 3: ЗУМЕРСКАЯ ПЕРСОНАЛЬНАЯ -->
  <div class="panel" id="panel3" style="display:none">
    <div class="form-wrap">
      <div class="fg">
        <div class="ff">
          <label>Дата рождения</label>
          <div style="display:grid;grid-template-columns:1fr 2fr 1.3fr;gap:8px">
            <select id="z_day"><option value="">День</option></select>
            <select id="z_month"><option value="">Месяц</option></select>
            <select id="z_year"><option value="">Год</option></select>
          </div>
        </div>
        <div><label>Город рождения</label><input type="text" id="z_city" placeholder=" "></div>
        <div><label>Имя</label><input type="text" id="z_iname" placeholder=" "></div>
        <div class="ff"><button class="btn" style="background:linear-gradient(135deg,#ff6b9d,#c44dff)" onclick="goZumer()">🔥 Рассчитать зумерскую пирамиду</button></div>
      </div>
    </div>
    <div class="res" id="z_res">
      <div class="base-row" id="z_br"></div>
      <div class="lg" id="z_lg"></div>
      <div class="pw"><div class="pyr" id="z_pyr"></div></div>
      <div id="z_out"></div>
    </div>
  </div>

  <!-- ПАНЕЛЬ 4: ЗУМЕРСКАЯ СОВМЕСТИМОСТЬ -->
  <div class="panel" id="panel4" style="display:none">
    <div class="form-wrap">
      <div class="compat-pair">
        <div class="compat-person">
          <h4>🔥 Партнёр 1</h4>
          <label>День / Месяц / Год</label>
          <div style="display:grid;grid-template-columns:1fr 2fr 1.3fr;gap:6px;margin-bottom:8px">
            <select id="za_day"><option value="">День</option></select>
            <select id="za_month"><option value="">Месяц</option></select>
            <select id="za_year"><option value="">Год</option></select>
          </div>
          <label>Город рождения</label>
          <input type="text" id="za_city" placeholder=" " style="margin-bottom:8px">
          <label>Имя</label>
          <input type="text" id="za_name" placeholder=" ">
        </div>
        <div class="compat-person">
          <h4>🔥 Партнёр 2</h4>
          <label>День / Месяц / Год</label>
          <div style="display:grid;grid-template-columns:1fr 2fr 1.3fr;gap:6px;margin-bottom:8px">
            <select id="zb_day"><option value="">День</option></select>
            <select id="zb_month"><option value="">Месяц</option></select>
            <select id="zb_year"><option value="">Год</option></select>
          </div>
          <label>Город рождения</label>
          <input type="text" id="zb_city" placeholder=" " style="margin-bottom:8px">
          <label>Имя</label>
          <input type="text" id="zb_name" placeholder=" ">
        </div>
      </div>
      <button class="btn" style="margin-top:12px;background:linear-gradient(135deg,#ff6b9d,#c44dff)" onclick="calcCompatZumer()">🔥 Рассчитать зумерскую совместимость</button>
    </div>
    <div id="zcompat-out"></div>
  </div>

</div>
<div class="tp" id="tp"></div>

<script>
var MO_NAMES=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];

// === TAB SWITCHER ===
var currentTab=0;
function switchTab(idx){
  currentTab=idx;
  isZumer=(idx===2||idx===3);
  var btns=document.querySelectorAll('.tab-btn');
  var panels=['panel1','panel2','panel3','panel4'].map(function(id){return document.getElementById(id);});
  var slider=document.getElementById('tabSlider');
  btns.forEach(function(b,i){b.classList.toggle('active',i===idx);});
  var trackW=document.querySelector('.tab-track').offsetWidth-8;
  var w=trackW/4;
  slider.style.width=w+'px';
  slider.style.transform='translateX('+(idx*w)+'px)';
  panels.forEach(function(p,i){p.style.display=(i===idx)?'block':'none';});
}

window.addEventListener('load',function(){
  // Init slider
  setTimeout(function(){switchTab(0);},10);
  // Fill date selects
  fillDateSelects('');
  fillDateSelects('a');
  fillDateSelects('b');
  fillDateSelects('z_');
  fillDateSelects('za_');
  fillDateSelects('zb_');
});

function fillDateSelects(prefix){
  var ids=prefix?[prefix+'day',prefix+'month',prefix+'year']:['day','month','year'];
  var dSel=document.getElementById(ids[0]);
  var mSel=document.getElementById(ids[1]);
  var ySel=document.getElementById(ids[2]);
  for(var i=1;i<=31;i++){var o=document.createElement('option');o.value=i;o.textContent=i;dSel.appendChild(o);}
  MO_NAMES.forEach(function(nm,idx){var o=document.createElement('option');o.value=idx+1;o.textContent=nm;mSel.appendChild(o);});
  for(var y=2142;y>=1900;y--){var o=document.createElement('option');o.value=y;o.textContent=y;ySel.appendChild(o);}
}

// === ДАННЫЕ ===
var LV=[
  {nums:[1,2,3,4,9,5,6,7,8],  ch:'Муладхара',    co:'#c42020',aura:'красный'},
  {nums:[10,11,12,13,14,15,16,17],ch:'Свадхистана',co:'#c05010',aura:'оранжевый'},
  {nums:[18,19,20,24,21,22,23],ch:'Манипура',     co:'#b88008',aura:'жёлтый'},
  {nums:[25,26,27,28,29,30],   ch:'Анахата',      co:'#1e6e0e',aura:'зелёный'},
  {nums:[31,32,35,33,34],      ch:'Вишудха',     co:'#0e80a8',aura:'голубой'},
  {nums:[36,37,38,39],         ch:'Аджна',        co:'#1040a8',aura:'синий'},
  {nums:[40,42,41],            ch:'Сахасрара',    co:'#5820a8',aura:'фиолетовый'}

function calcCompat(){
  function getDateFromPrefix(p){
    return{dd:+document.getElementById(p+'_day').value,mm:+document.getElementById(p+'_month').value,yyyy:+document.getElementById(p+'_year').value};
  }
  var A=getDateFromPrefix('a'),B=getDateFromPrefix('b');
  var aCity=document.getElementById('a_city').value||'';
  var aName=document.getElementById('a_name').value||'';
  var bCity=document.getElementById('b_city').value||'';
  var bName=document.getElementById('b_name').value||'';
  if(!A.dd||!A.mm||!A.yyyy||!B.dd||!B.mm||!B.yyyy){alert('Заполните даты для обоих людей');return;}

  var bA=calcBase(A.dd,A.mm,A.yyyy,aCity,aName);
  var bB=calcBase(B.dd,B.mm,B.yyyy,bCity,bName);
  var vA={},vB={},vC={};
  for(var n=1;n<=42;n++){vA[n]=cellVal(bA.base,n);vB[n]=cellVal(bB.base,n);}
  for(var n=1;n<=42;n++){var s=vA[n]+vB[n];while(s>42)s-=42;if(s===0)s=42;vC[n]=s;}

  function avgOf(nums){return Math.round(nums.reduce(function(a,b){return a+vals_c(b);},0)/nums.length);}
  function vals_c(n){return vC[n];}

  // 3.1 Цель встречи — макс без ячейки 42
  var meetCell=null,meetMax=-1;
  for(var n=1;n<=41;n++){if(vC[n]>meetMax||(vC[n]===meetMax&&(meetCell===null||n<meetCell))){meetMax=vC[n];meetCell=n;}}

  // 3.2 Общие таланты ≥29 (без 42)
  var cTalents=Object.entries(vC).filter(function(e){return e[1]>=29&&+e[0]!==42;}).sort(function(a,b){return b[1]-a[1];});

  // 3.3 Зоны роста ≤7
  var cZones=Object.entries(vC).filter(function(e){return e[1]<=7;}).sort(function(a,b){return a[1]-b[1];});

  // 3.4 Баланс чакр
  var cChakraAvgs=LV.map(function(l){
    var s=l.nums.reduce(function(a,n){return a+vC[n];},0);
    return{ch:l.ch,co:l.co,avg:Math.round(s/l.nums.length)};
  });

  // 3.5 Идеальный совместный путь — второй по величине среди 1-41
  var sortedC=Object.entries(vC).filter(function(e){return +e[0]<=41;}).sort(function(a,b){return b[1]-a[1]||(+a[0])-(+b[0]);});
  var pathCell=sortedC[1]?+sortedC[1][0]:+sortedC[0][0];

  // 3.6 Дети пары
  var kidsC=Math.round(LV[1].nums.reduce(function(a,n){return a+vC[n];},0)/LV[1].nums.length);

  // 3.7 Сексуальная совместимость
  var sexC=Math.round((vC[12]+vC[17])/2);

  // 3.8 Отношения
  var relC=vC[30];

  // 3.9 Финансы пары
  var finC=Math.round(LV[2].nums.reduce(function(a,n){return a+vC[n];},0)/LV[2].nums.length);

  var html2='';
  // Пирамида совместимости
  html2+='<p class="sect" style="margin-top:0">Пирамида совместимости</p>';
  html2+='<div style="font-size:13px;color:#7a6490;margin-bottom:10px">Базовое А: <b style="color:#7d5fa0">'+bA.base+'</b> · Базовое Б: <b style="color:#7d5fa0">'+bB.base+'</b></div>';
  html2+='<div class="pw"><div class="pyr" id="cpyr"></div></div>';

  html2+='<div class="grid2">';
  html2+='<div class="compat-section"><h4>🎯 3.1 Цель встречи</h4><div style="font-size:18px;font-weight:700;color:#7d5fa0">'+getNM()[meetCell]+'</div><div style="font-size:12px;color:#7a6490;margin-top:4px">Ячейка №'+meetCell+' · Значение: '+vC[meetCell]+'</div></div>';
  html2+='<div class="compat-section"><h4>🤝 3.5 Совместный путь</h4><div style="font-size:18px;font-weight:700;color:#7d5fa0">'+getNM()[pathCell]+'</div><div style="font-size:12px;color:#7a6490;margin-top:4px">Ячейка №'+pathCell+' · Значение: '+vC[pathCell]+'</div></div>';
  html2+='<div class="compat-section"><h4>👶 3.6 Дети пары</h4><div style="font-size:22px;font-weight:700;color:#7d5fa0">'+kidsC+'</div><div style="font-size:12px;color:#7a6490;margin-top:4px">'+gl(kidsC,'children')+'</div></div>';
  html2+='<div class="compat-section"><h4>💫 3.7 Сексуальная совместимость</h4><div style="font-size:22px;font-weight:700;color:#7d5fa0">'+sexC+'</div><div style="font-size:12px;color:#7a6490;margin-top:4px">'+gl(sexC,'sexual')+'</div></div>';
  html2+='<div class="compat-section"><h4>❤️ 3.8 Отношения</h4><div style="font-size:22px;font-weight:700;color:#7d5fa0">'+relC+'</div><div style="font-size:12px;color:#7a6490;margin-top:4px">'+gl(relC,'rel')+'</div></div>';
  html2+='<div class="compat-section"><h4>💰 3.9 Финансы пары</h4><div style="font-size:22px;font-weight:700;color:#7d5fa0">'+finC+'</div><div style="font-size:12px;color:#7a6490;margin-top:4px">'+gl(finC,'finance')+'</div></div>';
  html2+='</div>';

  html2+='<div class="compat-section" style="margin-top:10px"><h4>✨ 3.2 Общие таланты (≥29)</h4>';
  if(cTalents.length){html2+='<div class="tags">';cTalents.forEach(function(e){var en=ge(e[1]);html2+='<span class="tag" style="background:#e0f0e8;color:#2e7a4a">'+e[0]+'. '+getNM()[+e[0]]+' ('+e[1]+')</span>';});html2+='</div>';}
  else html2+='<span style="font-size:13px;color:#a896bc">Нет ячеек ≥29</span>';
  html2+='</div>';

  html2+='<div class="compat-section" style="margin-top:10px"><h4>⚠️ 3.3 Зоны роста (≤7)</h4>';
  if(cZones.length){html2+='<div class="tags">';cZones.forEach(function(e){html2+='<span class="tag" style="background:#f0e0e4;color:#b03050">'+e[0]+'. '+getNM()[+e[0]]+' ('+e[1]+')</span>';});html2+='</div>';}
  else html2+='<span style="font-size:13px;color:#a896bc">Нет блоков</span>';
  html2+='</div>';

  html2+='<div class="compat-section" style="margin-top:10px"><h4>⚡ 3.4 Баланс чакр пары</h4><div class="diag-row">';
  cChakraAvgs.forEach(function(d){
    var pct=Math.round((d.avg/42)*100);
    html2+='<div class="diag-bar"><div class="db-name">'+d.ch+'</div><div class="db-track"><div class="db-fill" style="width:'+pct+'%;background:'+d.co+'"></div></div><div class="db-val">'+d.avg+'</div></div>';
    html2+='<div style="font-size:11px;color:#a896bc;padding-left:120px;margin-top:-4px;margin-bottom:4px">'+gl(d.avg,'chakra')+'</div>';
  });
  html2+='</div></div>';

  document.getElementById('compat-out').innerHTML=html2;
  document.getElementById('compat-out').scrollIntoView({behavior:'smooth',block:'start'});
  buildPyramid(vC,0,document.getElementById('cpyr'));
}


function downloadPDF(encodedUrl, encodedName){
  var url=decodeURIComponent(encodedUrl);
  var name=decodeURIComponent(encodedName);
  var win=window.open(url,'_blank');
  if(!win){alert('Разрешите всплывающие окна, затем в открывшейся карте нажмите «Скачать PDF»');return;}
}

function copyClientUrl(url){
  navigator.clipboard.writeText(url).then(function(){
    var btn=event.target;
    btn.textContent='✅ Скопировано!';
    setTimeout(function(){btn.textContent='📋 Скопировать';},2000);
