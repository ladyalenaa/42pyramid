<script>
var MO_NAMES=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];

// === TAB SWITCHER ===
var currentTab=0;
function switchTab(idx){
  currentTab=idx;
  var btns=document.querySelectorAll('.tab-btn');
  var panels=[document.getElementById('panel1'),document.getElementById('panel2')];
  var slider=document.getElementById('tabSlider');
  btns.forEach(function(b,i){b.classList.toggle('active',i===idx);});
  // move slider
  var trackW=document.querySelector('.tab-track').offsetWidth-8;
  slider.style.width=(trackW/2)+'px';
  slider.style.transform='translateX('+(idx*(trackW/2))+'px)';
  // show panel
  panels.forEach(function(p,i){
    if(i===idx){p.style.display='block';}
    else{p.style.display='none';}
  });
}

window.addEventListener('load',function(){
  // Init slider
  setTimeout(function(){switchTab(0);},10);
  // Fill date selects
  fillDateSelects('');
  fillDateSelects('a');
  fillDateSelects('b');
});

function fillDateSelects(prefix){
  var ids=prefix?[prefix+'_day',prefix+'_month',prefix+'_year']:['day','month','year'];
  var dSel=document.getElementById(ids[0]);
  var mSel=document.getElementById(ids[1]);
  var ySel=document.getElementById(ids[2]);
  for(var i=1;i<=31;i++){var o=document.createElement('option');o.value=i;o.textContent=i;dSel.appendChild(o);}
  MO_NAMES.forEach(function(nm,idx){var o=document.createElement('option');o.value=idx+1;o.textContent=nm;mSel.appendChild(o);});
  for(var y=2142;y>=1900;y--){var o=document.createElement('option');o.value=y;o.textContent=y;ySel.appendChild(o);}
}

// === ДАННЫЕ ===

];

var DESC={1:'Сила — чувствовать чужую боль',2:'Сила — предусмотрительность',3:'Сила — быстрая адаптация',4:'Сила — открытость к новому',5:'Сила — исцеление тела',6:'Сила — смелость и созидание',7:'Сила — находить ресурсы',8:'Сила — дисциплина и преданность',9:'Сила — влияние без давления',10:'Сила — эмоциональная глубина',11:'Сила — гармоничные отношения',12:'Сила — радоваться жизни',13:'Сила — понимание психологии',14:'Сила — лёгкость и свобода',15:'Сила — творческий потенциал',16:'Сила — любить и вдохновлять',17:'Сила — принятие своей природы',18:'Сила — качество и дисциплина',19:'Сила — смелость и предприимчивость',20:'Сила — выносливость',21:'Сила — амбиции и целеустремлённость',22:'Сила — профессионализм',23:'Сила — наблюдательность',24:'Сила — лидерство и организованность',25:'Сила — видеть разные стороны',26:'Сила — сострадание',27:'Сила — любовь и забота',28:'Сила — любовь к себе',29:'Сила — эмпатия',30:'Сила — безусловная любовь',31:'Сила — мудрость',32:'Сила — честность',33:'Сила — передавать знания',34:'Сила — вдохновение',35:'Сила — ясность и безупречность',36:'Сила — открытость прозрениям',37:'Сила — замечать знаки',38:'Сила — понимание энергий',39:'Сила — интуиция душ',40:'Сила — духовная глубина',41:'Сила — мудрость и смирение',42:'Сила — полнота и единство'};

var LM={};
var alpha='АБВГДЕЁЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯ';
for(var i=0;i<alpha.length;i++){LM[alpha[i]]=i+1;LM[alpha[i].toLowerCase()]=i+1;}

function sumStr(str){var s=0;for(var i=0;i<str.length;i++){s+=LM[str[i]]||0;}while(s>42)s-=42;return Math.max(1,s);}
function calcBase(dd,mm,yyyy,city,name){
  var ds=String(dd)+String(mm)+String(yyyy),sd=0;
  ds.split('').forEach(function(d){sd+=+d;});
  var sc=sumStr(city.replace(/[^а-яёА-ЯЁ]/g,''));
  var sn=sumStr(name.replace(/[^а-яёА-ЯЁ]/g,''));
  var base=sd+sc+sn;while(base>42)base-=42;if(base<1)base=1;
  return{base:base,sd:sd,sc:sc,sn:sn};
}
function cellVal(base,n){var v=(base*n)%42;return v===0?42:v;}

  sexual:['Низкая','Средняя','Хорошая','Высокая','Очень высокая','Максимальная']
};
function gl(v,t){return TBLS[t][bandIdx(v)];}

var G_VALS={}; // глобальные vals для совместимости

function calcAge(yyyy,mm,dd,yr,curMo){
  var age=yr-yyyy;
  if(curMo<mm||(curMo===mm&&new Date().getDate()<dd))age--;
  return Math.max(0,age);
}
// Активная ячейка = base + возраст (если <1 → 1, если >42 → вычитаем 42)
function pY(base,yyyy,mm,dd,yr){
  var age=calcAge(yyyy,mm,dd,yr,new Date().getMonth()+1);
  var v=base+age-42;while(v>42)v-=42;if(v<1)v=1;return v;
}
function pM(base,yyyy,mm,dd,yr,mo){
  var age=calcAge(yyyy,mm,dd,yr,mo);
  var v=base+age+mo-42;while(v>42)v-=42;if(v<1)v=1;return v;
}

function addTip(cell,n,v){
  cell.addEventListener('mouseenter',function(e){
    var t=document.getElementById('tp'),en=ge(v);
    t.style.display='block';
    t.innerHTML='<b style="color:#c4b8ff">'+n+'. '+NM[n]+'</b><br>Значение: <b style="color:#FFD700">'+v+'</b><br><span style="color:'+en.co+'">'+en.la+'</span><br><span style="color:#6a5e8a;font-size:11px">'+DESC[n]+'</span>';
    t.style.left=(e.clientX+16)+'px';t.style.top=(e.clientY-14)+'px';
  });
  cell.addEventListener('mousemove',function(e){var t=document.getElementById('tp');t.style.left=(e.clientX+16)+'px';t.style.top=(e.clientY-14)+'px';});
  cell.addEventListener('mouseleave',function(){document.getElementById('tp').style.display='none';});
}

function buildPyramid(vals,base,pyrEl){
  pyrEl.innerHTML='';
  LV.slice().reverse().forEach(function(level){
    var row=document.createElement('div');row.className='pr';
    level.nums.forEach(function(n){
      var v=vals[n];
      var cell=document.createElement('div');
      cell.className='cl'+(n===base?' bh':'');
      cell.style.background=level.co;
      cell.innerHTML='<span class="cn">'+n+'</span><div class="dv"></div><span class="cv">'+v+'</span>';
      addTip(cell,n,v);row.appendChild(cell);
    });
    pyrEl.appendChild(row);
  });
}

function go(){
  var dd=+document.getElementById('day').value;
  var mm=+document.getElementById('month').value;
  var yyyy=+document.getElementById('year').value;
  var city=document.getElementById('city').value||'';
  var name=document.getElementById('iname').value||'';
  if(!dd||!mm||!yyyy){alert('Пожалуйста, выберите дату рождения');return;}
  if(!city.trim()){alert('Пожалуйста, укажите город рождения');return;}
  if(!name.trim()){alert('Пожалуйста, укажите имя');return;}

  var B=calcBase(dd,mm,yyyy,city,name),base=B.base;
  var vals={};for(var n=1;n<=42;n++)vals[n]=cellVal(base,n);
  G_VALS=vals;

  document.getElementById('res').style.display='block';
  document.getElementById('res').scrollIntoView({behavior:'smooth',block:'start'});

  document.getElementById('br').innerHTML='Базовое число: <strong>'+base+'</strong><br><span style="font-size:12px">дата ('+B.sd+') + город «'+city+'» ('+B.sc+') + имя «'+name+'» ('+B.sn+')</span>';
  document.getElementById('lg').innerHTML=LV.map(function(l){
    // Правильные полные названия для легенды
    var fullNames={'Муладхара':'Муладхара','Свадхистхана':'Свадхистхана','Манипура':'Манипура','Анахата':'Анахата','Вишуддха':'Вишуддха','Аджна':'Аджна','Сахасрара':'Сахасрара'};
    return '<div class="li"><div class="ld" style="background:'+l.co+'"></div><span>'+(fullNames[l.ch]||l.ch)+'</span></div>';
  }).join('');

  buildPyramid(vals,base,document.getElementById('pyr'));

  // Вспомогательные
  function chakraVals(idx){return LV[idx].nums.map(function(n){return vals[n];});}
  function chakraAvg(idx){var vs=chakraVals(idx);return Math.round(vs.reduce(function(a,b){return a+b;},0)/vs.length);}
  function chakraMaxCell(idx,excludeList){
    var best=null,bestV=-1;
    LV[idx].nums.forEach(function(n){
      if(excludeList&&excludeList.indexOf(n)>=0)return;
      if(vals[n]>bestV||(vals[n]===bestV&&(best===null||n<best))){bestV=vals[n];best=n;}
    });
    return best;
  }

  var sorted=Object.entries(vals).sort(function(a,b){return a[1]-b[1]||(+a[0])-(+b[0]);});
  var sortedDesc=Object.entries(vals).sort(function(a,b){return b[1]-a[1]||(+a[0])-(+b[0]);});

  // 1. Текущий сценарий
  var scenCell=base,scenVal=vals[base],scenEn=ge(scenVal);

  // 2. Таланты (макс из каждой чакры; для Сахасрары — только ячейки 40 и 41)
  var talents=LV.map(function(l,i){
    var exclude=(i===6)?[42]:null; // Сахасрара: исключаем ячейку 42
    var mc=chakraMaxCell(i,exclude);
    return{cell:mc,val:vals[mc],chakra:l.ch,co:l.co};
  });

  // 3. Зона ограничений
  var minV=sorted[0][1];
  var limitCells=sorted.filter(function(e){return e[1]<=minV+2;}).slice(0,2).map(function(e){return +e[0];});

  // 4. Прошлая жизнь
  var pastN=+sorted[0][0];

  // 5. Финансы
  var finAvg=chakraAvg(2);
  // 6. Дети
  var kidsAvg=chakraAvg(1);
  // 7. Популярность
  var popAvg=chakraAvg(4);

  // 8. Путь к Источнику = 42 - base
  var pathToSrc=42-base;
  var pathToSrcLabel=(pathToSrc===0)?'Уже в Источнике':(pathToSrc<=7)?'Очень близко':(pathToSrc<=14)?'Близко':(pathToSrc<=21)?'Средний путь':(pathToSrc<=28)?'Далеко':(pathToSrc<=35)?'Очень далеко':'Начало пути';

  // 9. Здоровье
  var healthVal=vals[5];
  // 10. Карьера
  var careerVal=vals[18];
  // 11. Отношения
  var relVal=vals[30];

  // 12. Духовный рост — ячейка с наибольшим числом (исключая №42)
  var spiritCell=null,spiritMax=-1;
  for(var n=1;n<=41;n++){if(vals[n]>spiritMax||(vals[n]===spiritMax&&(spiritCell===null||n<spiritCell))){spiritMax=vals[n];spiritCell=n;}}
  var spiritVal=vals[spiritCell];

  // 13. Цвет ауры
  var avgs=LV.map(function(l,i){return chakraAvg(i);});
  var maxAvg=Math.max.apply(null,avgs),auraIdx=avgs.indexOf(maxAvg),auraChakra=LV[auraIdx];

  // 14. Уровень энергии
  var energyVal=vals[base];

  // 15. Место в истории — макс в доминирующей чакре, исключая №42
  var histCell=chakraMaxCell(auraIdx,[42]);

  // 16. Ключевые годы — таблица возраст 0–126
  var now=new Date(),cy=now.getFullYear(),cm=now.getMonth()+1;
  var topVals=[];
  var tableRows=[];
  var birthYear=yyyy;
  for(var age0=0;age0<=126;age0++){
    var yr=birthYear+age0;
    var cellN=pY(base,yyyy,mm,dd,yr);
    var cellV=vals[cellN];
    var en=ge(cellV);
    tableRows.push({yr:yr,age:age0,cell:cellN,val:cellV,en:en,isCurYear:(yr===cy)});
    topVals.push(cellV);
  }
  topVals.sort(function(a,b){return b-a;});
  var threshold=topVals[4]||0;
  tableRows.forEach(function(r){r.isKey=r.val>=threshold;});

  // 17. Характер
  var charCells=[1,9,10,17,18,24,25,30,31,35,36,42];

  // 18. Идеальный партнёр
  var p1=base+21,p2=base-21;
  if(p1>42)p1=42;if(p1<1)p1=1;
  if(p2>42)p2=42;if(p2<1)p2=1;
  var partnerCell=(p1<=p2)?p1:p2;
  if(base+21<=42&&base-21>=1)partnerCell=Math.min(base+21,base-21);
  else if(base+21<=42)partnerCell=base+21;
  else if(base-21>=1)partnerCell=base-21;
  else partnerCell=1;

  // 19. Кармическая задача
  var karmaCell=+sorted[0][0];

  // 20. Зона роста
  var growthCells=Object.entries(vals).filter(function(e){return e[1]>=8&&e[1]<=14;}).map(function(e){return +e[0];});

  // 21. Энергодиагностика
  var diagAvgs=LV.map(function(l,i){return{name:l.ch,co:l.co,avg:chakraAvg(i)};});

  // ==== РЕНДЕР ====
  var html='';

  html+='<p class="sect">1. Текущий сценарий</p>';
  html+='<div class="cc" style="margin-bottom:10px"><div class="la">Ячейка №'+scenCell+'</div><div class="va" style="color:'+scenEn.co+'">'+NM[scenCell]+'</div><div class="da">Значение: <b>'+scenVal+'</b> · '+scenEn.la+' — '+scenEn.de+'</div><div class="da" style="margin-top:4px;color:#7a7095">'+DESC[scenCell]+'</div></div>';

  html+='<p class="sect">2. Таланты (по одному из каждой чакры)</p><div class="grid2" style="margin-bottom:10px">';
  talents.forEach(function(t){var en=ge(t.val);html+='<div class="cc"><div class="la">'+t.chakra+'</div><div class="va" style="color:'+en.co+'">'+t.val+'</div><div class="da">'+t.cell+'. '+NM[t.cell]+'</div></div>';});
  html+='</div>';

  html+='<p class="sect">3. Зона ограничений</p><div class="grid2" style="margin-bottom:10px">';
  limitCells.forEach(function(n){var en=ge(vals[n]);html+='<div class="cc"><div class="la">Ячейка №'+n+'</div><div class="va" style="color:'+en.co+'">'+vals[n]+'</div><div class="da">'+NM[n]+'</div></div>';});
  html+='</div>';

  html+='<p class="sect">4. Прошлая жизнь</p><div class="cc" style="margin-bottom:10px"><div class="la">Роль в прошлом воплощении (ячейка №'+pastN+')</div><div class="va">'+NM[pastN]+'</div><div class="da">Значение: '+vals[pastN]+' · Урок этой жизни: '+DESC[pastN]+'</div></div>';

  html+='<p class="sect">Ключевые показатели (5–12)</p><div class="grid2">';
  function card(t,v,l,s){return '<div class="cc"><div class="la">'+t+'</div><div class="va">'+v+'</div><div class="da">'+l+(s?'<br>'+s:'')+'</div></div>';}
  html+=card('5. Финансы (ср. Манипуры 18–24)',finAvg,gl(finAvg,'finance'),'Уровень: '+ge(finAvg).la);
  html+=card('6. Дети (ср. Свадхистханы 10–17)',kidsAvg,gl(kidsAvg,'children'),'');
  html+=card('7. Популярность (ср. Вишуддхи 31–35)',popAvg,gl(popAvg,'popular'),'');
  html+=card('8. Путь к Источнику (42 − base)',pathToSrc,pathToSrcLabel,'');
  html+=card('9. Здоровье (яч.5)',healthVal,gl(healthVal,'health'),'');
  html+=card('10. Карьера (яч.18)',careerVal,gl(careerVal,'career'),'');
  html+=card('11. Отношения (яч.30)',relVal,gl(relVal,'rel'),'');
  html+=card('12. Духовный рост (макс. ячейка, без №42)',spiritVal,gl(spiritVal,'spirit'),'Ячейка №'+spiritCell);
  html+='</div>';

  html+='<p class="sect">13. Цвет ауры</p><div class="cc" style="margin-bottom:10px;display:flex;align-items:center;gap:16px"><div class="aura-dot" style="background:'+auraChakra.co+'">'+maxAvg+'</div><div><div style="font-size:18px;font-weight:700;color:'+auraChakra.co+'">'+auraChakra.aura.charAt(0).toUpperCase()+auraChakra.aura.slice(1)+'</div><div style="font-size:13px;color:#8878aa;margin-top:3px">'+auraChakra.ch+' · среднее '+maxAvg+'</div></div></div>';

  var enE=ge(energyVal);
  html+='<p class="sect">14. Уровень энергии</p><div class="cc" style="margin-bottom:10px"><div class="la">Ячейка базового числа №'+base+'</div><div class="va" style="color:'+enE.co+'">'+energyVal+' — '+enE.la+'</div><div class="da">'+gl(energyVal,'energy')+'</div></div>';

  html+='<p class="sect">15. Место в истории</p><div class="cc" style="margin-bottom:10px"><div class="la">'+auraChakra.ch+' · ячейка №'+histCell+' (без №42)</div><div class="va">'+NM[histCell]+'</div><div class="da">Главный вклад: '+DESC[histCell]+'</div></div>';

  // 16. Ключевые годы — ТАБЛИЦА
  html+='<p class="sect">16. Ключевые годы жизни</p>';
  html+='<div style="font-size:12px;color:#6a5e8a;margin-bottom:8px">⭐ — топ-5 лет &nbsp;·&nbsp; ← текущий год &nbsp;·&nbsp; Формула: base('+base+') + возраст − 42</div>';
  html+='<div class="key-years" style="max-height:400px;overflow-y:auto;border-radius:10px;border:1px solid #2d2550"><table class="ky-table">';
  html+='<thead style="position:sticky;top:0;background:#1a1530;z-index:1"><tr><th>Год</th><th>Возраст</th><th>Активная ячейка</th><th>Сценарий</th><th>Число в ячейке</th><th>Уровень энергии</th><th>Ключевой</th></tr></thead><tbody>';
  tableRows.forEach(function(r){
    html+='<tr style="'+(r.isCurYear?'background:rgba(255,215,0,0.08);border-left:3px solid #FFD700':r.isKey?'background:rgba(127,119,221,0.1)':'')+'">';
    html+='<td style="font-weight:600;color:'+(r.isCurYear?'#FFD700':r.isKey?'#c4b8ff':'#e8e4f8')+'">'+r.yr+(r.isCurYear?' ←':'')+'</td>';
    html+='<td>'+r.age+'</td>';
    html+='<td style="color:#c4b8ff">№'+r.cell+'</td>';
    html+='<td style="font-size:12px">'+NM[r.cell]+'</td>';
    html+='<td style="font-weight:700;color:'+r.en.co+'">'+r.val+'</td>';
    html+='<td style="font-size:12px;color:'+r.en.co+'">'+r.en.la+'</td>';
    html+='<td class="star">'+(r.isKey?'⭐':'')+'</td>';
    html+='</tr>';
  });
  html+='</tbody></table></div>';

  html+='<p class="sect">17. Характер</p><div class="grid3" style="margin-bottom:10px">';
  charCells.forEach(function(n){var v=vals[n],en=ge(v);html+='<div class="cc"><div class="la">Яч.'+n+'</div><div style="font-size:13px;font-weight:600;color:'+en.co+'">'+NM[n]+'</div><div class="da">'+v+' · '+en.la+'</div></div>';});
  html+='</div>';

  html+='<p class="sect">18. Сценарий идеального партнёра</p><div class="cc" style="margin-bottom:10px"><div class="la">Ячейка №'+partnerCell+' (base '+base+' ± 21)</div><div class="va">'+NM[partnerCell]+'</div><div class="da">Значение: '+vals[partnerCell]+' · '+DESC[partnerCell]+'</div></div>';

  html+='<p class="sect">19. Кармическая задача</p><div class="cc" style="margin-bottom:10px"><div class="la">Главный урок жизни (ячейка №'+karmaCell+')</div><div class="va">'+NM[karmaCell]+'</div><div class="da">'+DESC[karmaCell]+'</div></div>';

  html+='<p class="sect">20. Зона роста (значения 8–14)</p>';
  if(growthCells.length){html+='<div class="tags">';growthCells.forEach(function(n){html+='<span class="tag" style="background:#1a2030;color:#88bbff">'+n+'. '+NM[n]+' ('+vals[n]+')</span>';});html+='</div>';}
  else html+='<div style="font-size:13px;color:#6a5e8a;margin-bottom:8px">Нет ячеек в зоне пробуждения</div>';

  html+='<p class="sect">21. Энергодиагностика чакр</p><div class="diag-row">';
  diagAvgs.forEach(function(d){
    var pct=Math.round((d.avg/42)*100);
    html+='<div class="diag-bar"><div class="db-name">'+d.name+'</div><div class="db-track"><div class="db-fill" style="width:'+pct+'%;background:'+d.co+'"></div></div><div class="db-val">'+d.avg+'</div></div>';
    html+='<div style="font-size:11px;color:#6a5e8a;padding-left:120px;margin-top:-4px;margin-bottom:4px">'+gl(d.avg,'chakra')+'</div>';
  });
  html+='</div>';

  // --- ГОДОВОЙ ПРОГНОЗ ---
  var ageNow=calcAge(yyyy,mm,dd,cy,cm);
  html+='<p class="sect">Годовой прогноз</p>';
  html+='<div style="font-size:12px;color:#6a5e8a;margin-bottom:10px">Возраст: <b style="color:#c4b8ff">'+ageNow+' лет</b> · Формула: base('+base+') + возраст → номер ячейки → значение в ней</div>';
  html+='<div class="pg">';
  [cy,cy+1,cy+2,cy+3].forEach(function(yr){
    var cellN=pY(base,yyyy,mm,dd,yr);
    var cellV=vals[cellN]; // значение В ячейке!
    var yEn=ge(cellV);
    var age=calcAge(yyyy,mm,dd,yr,6);
    html+='<div class="pb"><div class="pt">'+yr+' год ('+age+' лет)</div>';
    html+='<div class="pv" style="color:'+yEn.co+'">яч. №'+cellN+' / '+cellV+'</div>';
    html+='<div class="pd">'+NM[cellN]+'<br><span style="color:'+yEn.co+'">'+yEn.la+' — '+yEn.de+'</span></div></div>';
  });
  html+='</div>';

  // --- МЕСЯЧНЫЙ ПРОГНОЗ ---
  html+='<p class="sect">Месячный прогноз — '+cy+'</p>';
  html+='<div style="font-size:12px;color:#6a5e8a;margin-bottom:10px">Формула: base('+base+') + возраст + номер месяца → номер ячейки → значение в ней</div>';
  html+='<div class="mg">';
  for(var mo=1;mo<=12;mo++){
    var cellN=pM(base,yyyy,mm,dd,cy,mo);
    var cellV=vals[cellN]; // значение В ячейке!
    var mEn=ge(cellV);
    var isCur=(mo===cm);
    html+='<div class="mb'+(isCur?' cur':'')+'\" style=\"background:'+mEn.co+'22;border-color:'+mEn.co+(isCur?';border-width:2px':'')+'\"><div class=\"mn\" style=\"color:'+mEn.co+'\">'+MO_NAMES[mo-1]+'</div>';
    html+='<div class="mv" style="color:#fff">яч.'+cellN+'<br><span style="color:'+mEn.co+'">'+cellV+'</span></div>';
    html+='<div class="ml" style="color:'+mEn.co+'">'+mEn.la+'</div></div>';
  }
  html+='</div>';

  document.getElementById('out').innerHTML=html;
}

// === СОВМЕСТИМОСТЬ ===
function calcCompat(){
  function getDateFromPrefix(p){
    return{dd:+document.getElementById(p+'_day').value,mm:+document.getElementById(p+'_month').value,yyyy:+document.getElementById(p+'_year').value};
  }
  var A=getDateFromPrefix('a'),B=getDateFromPrefix('b');
  var aCity=document.getElementById('a_city').value||'';
  var aName=document.getElementById('a_name').value||'';
  var bCity=document.getElementById('b_city').value||'';
  var bName=document.getElementById('b_name').value||'';
  if(!A.dd||!A.mm||!A.yyyy||!B.dd||!B.mm||!B.yyyy){alert('Заполните даты для обоих людей');return;}

  var bA=calcBase(A.dd,A.mm,A.yyyy,aCity,aName);
  var bB=calcBase(B.dd,B.mm,B.yyyy,bCity,bName);
  var vA={},vB={},vC={};
  for(var n=1;n<=42;n++){vA[n]=cellVal(bA.base,n);vB[n]=cellVal(bB.base,n);}
  for(var n=1;n<=42;n++){var s=vA[n]+vB[n];while(s>42)s-=42;if(s===0)s=42;vC[n]=s;}

  function avgOf(nums){return Math.round(nums.reduce(function(a,b){return a+vals_c(b);},0)/nums.length);}
  function vals_c(n){return vC[n];}

  // 3.1 Цель встречи — макс без ячейки 42
  var meetCell=null,meetMax=-1;
  for(var n=1;n<=41;n++){if(vC[n]>meetMax||(vC[n]===meetMax&&(meetCell===null||n<meetCell))){meetMax=vC[n];meetCell=n;}}

  // 3.2 Общие таланты ≥29 (без 42)
  var cTalents=Object.entries(vC).filter(function(e){return e[1]>=29&&+e[0]!==42;}).sort(function(a,b){return b[1]-a[1];});

  // 3.3 Зоны роста ≤7
  var cZones=Object.entries(vC).filter(function(e){return e[1]<=7;}).sort(function(a,b){return a[1]-b[1];});

  // 3.4 Баланс чакр
  var cChakraAvgs=LV.map(function(l){
    var s=l.nums.reduce(function(a,n){return a+vC[n];},0);
    return{ch:l.ch,co:l.co,avg:Math.round(s/l.nums.length)};
  });

  // 3.5 Идеальный совместный путь — второй по величине среди 1-41
  var sortedC=Object.entries(vC).filter(function(e){return +e[0]<=41;}).sort(function(a,b){return b[1]-a[1]||(+a[0])-(+b[0]);});
  var pathCell=sortedC[1]?+sortedC[1][0]:+sortedC[0][0];

  // 3.6 Дети пары
  var kidsC=Math.round(LV[1].nums.reduce(function(a,n){return a+vC[n];},0)/LV[1].nums.length);

  // 3.7 Сексуальная совместимость
  var sexC=Math.round((vC[12]+vC[17])/2);

  // 3.8 Отношения
  var relC=vC[30];

  // 3.9 Финансы пары
  var finC=Math.round(LV[2].nums.reduce(function(a,n){return a+vC[n];},0)/LV[2].nums.length);

  var html2='';
  // Пирамида совместимости
  html2+='<p class="sect" style="margin-top:0">Пирамида совместимости</p>';
  html2+='<div style="font-size:13px;color:#8878aa;margin-bottom:10px">Базовое А: <b style="color:#c4b8ff">'+bA.base+'</b> · Базовое Б: <b style="color:#c4b8ff">'+bB.base+'</b></div>';
